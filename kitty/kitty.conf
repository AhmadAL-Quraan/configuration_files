# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #

# you can choose themes from $HOME/.config/kitty/kitty-themes/

include ./kitty-themes/00-Default.conf
allow_remote_control yes

# Uncomment and set the background image path to use a custom wallpaper
#background_image /home/ahmadquraan/Pictures/wallpapers/Wet-Road.jpg

background_image_opacity 0.25
background_tint 0.89

font_family FantasqueSansM Nerd Font Mono Bold
font_size 14.0
bold_font auto
italic_font auto
bold_italic_font auto


# Cursor 
cursor #ff79c6
cursor_text_color #1e1e2e
#animated cursor

cursor_trail 1 


background_opacity 0.9
dynamic_background_opacity 1
confirm_os_window_close 0


# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 4
selection_foreground none
selection_background none

foreground #dddddd
background #000000
clipboard_control write-clipboard write-primary

#make it transparent
background_opacity 0.7
#Black out the image
backgroud_tint 0.0 
background_image_layout scaled
